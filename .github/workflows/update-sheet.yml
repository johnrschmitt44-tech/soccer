name: Update pool sheet

on:
  schedule:
    # Every 20 minutes. GitHub cron is UTC and best-effort, not exact.
    - cron: "*/20 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Skip outside tournament window
        run: |
          today=$(date -u +%Y%m%d)
          if [ "$today" -lt 20260610 ] || [ "$today" -gt 20260721 ]; then
            echo "Outside tournament window, skipping."
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi
      - uses: actions/checkout@v4
        if: env.SKIP != '1'
      - uses: actions/setup-python@v5
        if: env.SKIP != '1'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: updater/requirements.txt
      - name: Install dependencies
        if: env.SKIP != '1'
        run: pip install -r updater/requirements.txt
      - name: Sync results to sheet
        if: env.SKIP != '1'
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GSA_KEY_JSON: ${{ secrets.GSA_KEY_JSON }}
        run: python updater/update_sheet.py
